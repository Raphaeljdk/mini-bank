name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Backend
        run: cd backend && mvn clean package -DskipTests
      - name: Build Frontend
        run: cd frontend && npm install && npm run build
